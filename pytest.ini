[pytest]
testpaths = tests backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=core --cov=trading --cov=quant --cov=data --cov=ai --cov=gamma --cov=monitoring --cov=backtest --cov=scheduler --cov=backend/api/routes --cov-report=term-missing --cov-report=html
markers =
    integration: hits real ORAT postgres, requires ORAT_DATABASE_URL
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
