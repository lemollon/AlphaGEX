# Render Blueprint for SpreadWorks
# Double Diagonal & Calendar Spread Analyzer
# 3 services: Static Frontend + Python Backend + Node Discord Bot

services:
  # SERVICE 1: React Frontend (Vite static build)
  - type: web
    name: spreadworks-frontend
    runtime: static
    branch: main
    autoDeploy: true
    buildCommand: cd spreadworks/frontend && npm install && npm run build
    staticPublishPath: spreadworks/frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  # SERVICE 2: Python Backend API (FastAPI)
  - type: web
    name: spreadworks-backend
    runtime: python
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd spreadworks && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd spreadworks && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: America/Chicago
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TRADIER_TOKEN
        sync: false
      - key: TRADIER_ACCOUNT_ID
        sync: false
      - key: ALPHAGEX_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alphagex-db
          property: connectionString

  # SERVICE 3: Discord Bot (Node.js worker)
  - type: worker
    name: spreadworks-bot
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd spreadworks/bot && npm install
    startCommand: cd spreadworks/bot && node src/index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: VITE_API_URL
        sync: false

# No separate database — shares alphagex-db from main render.yaml
