<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="IronForge">
  <defs>
    <linearGradient id="ifF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FB7A3D"/>
      <stop offset="0.5" stop-color="#E8531F"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="ifI" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F5F5F4"/>
      <stop offset="1" stop-color="#D6D3D1"/>
    </linearGradient>
  </defs>

  <!-- F depth shadow -->
  <g fill="#7C2D0E" transform="translate(3.5,4)">
    <polygon points="54,28 76,28 76,92 54,92"/>
    <polygon points="54,28 102,28 90,48 54,48"/>
    <polygon points="54,56 88,56 76,74 54,74"/>
  </g>

  <!-- I (white, slab serif) -->
  <g fill="url(#ifI)">
    <rect x="26" y="36" width="20" height="56"/>
    <rect x="18" y="36" width="36" height="12"/>
    <rect x="18" y="80" width="36" height="12"/>
  </g>

  <!-- F (orange, angular blade arms) -->
  <g fill="url(#ifF)">
    <polygon points="54,28 76,28 76,92 54,92"/>
    <polygon points="54,28 102,28 90,48 54,48"/>
    <polygon points="54,56 88,56 76,74 54,74"/>
  </g>
  <!-- F top highlight -->
  <polygon points="54,28 102,28 98,34 54,34" fill="#FB8B53" opacity="0.7"/>
</svg>
