<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- FLARE — directional 0DTE debit. 8-pointed starburst suggesting an
       intraday flash; visually distinct from FLAME's teardrop and INFERNO's
       triple-flame. -->
  <!-- Cardinal rays (long) -->
  <path d="M12 1 L13 11 L23 12 L13 13 L12 23 L11 13 L1 12 L11 11 Z" fill="#C026D3"/>
  <!-- Diagonal rays (shorter) -->
  <g transform="rotate(45 12 12)">
    <path d="M12 4 L12.6 11.4 L20 12 L12.6 12.6 L12 20 L11.4 12.6 L4 12 L11.4 11.4 Z" fill="#D946EF" opacity="0.7"/>
  </g>
  <!-- Hot core -->
  <circle cx="12" cy="12" r="2.5" fill="#E879F9"/>
  <circle cx="12" cy="12" r="1.2" fill="#FDF4FF"/>
</svg>
