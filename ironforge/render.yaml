# IronForge on Render
# ====================
# Deploy FLAME + SPARK Iron Condor paper trading bots on Render.

databases:
  - name: ironforge-db
    plan: free
    databaseName: ironforge
    user: ironforge

services:
  # ---- Next.js Dashboard ----
  - type: web
    name: ironforge-dashboard
    runtime: node
    plan: free
    rootDir: ironforge/webapp
    buildCommand: npm install && npm run build
    startCommand: HOSTNAME=0.0.0.0 node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_BASE_URL
        value: https://sandbox.tradier.com/v1
      - key: NODE_ENV
        value: production

  # ---- FLAME Trading Bot (2DTE) ----
  - type: worker
    name: ironforge-flame
    runtime: python
    plan: free
    rootDir: ironforge
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/run_flame.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_BASE_URL
        value: https://sandbox.tradier.com/v1

  # ---- SPARK Trading Bot (1DTE) ----
  - type: worker
    name: ironforge-spark
    runtime: python
    plan: free
    rootDir: ironforge
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/run_spark.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_BASE_URL
        value: https://sandbox.tradier.com/v1
