# IronForge on Render
# ====================
# TWO SERVICES, ONE IMAGE. Which half a service serves is IRONFORGE_MODE
# (src/lib/surface.ts). An unset value means "serve everything" — today's
# behaviour — so a service that forgets the variable degrades to the status quo
# rather than 404ing half the app.
#
#   ironforge-product  →  ironforge.trade        THE REAL BUSINESS
#       SPARK, SPARK2, FLAME. The live broker accounts. Everything a paying
#       customer sees. HOLDS THE BROKER CREDENTIALS and RUNS THE TRADING ENGINE.
#
#   ironforge-lab      →  ironforge-899p.onrender.com     PRIVATE RESEARCH
#       INFERNO, BLAZE, FLARE, KINDLE, EMBER backtests, GEX/volatility/briefings.
#       NO live money. NO account credentials. It DISPLAYS results the product
#       engine wrote; it does not drive trading.
#
# WHY THE ENGINE LIVES ON PRODUCT
# One engine scans every bot, so the lab's paper bots keep running without the
# lab holding any credentials. Two engines would need per-service bot rosters and
# per-group locks — more machinery, more to go wrong. The lab keeps a market-data
# key so its pages can price paper positions, but it has no production account
# credentials, so isProductionBot() + getProductionAccountsForBot() make placing a
# live order impossible in code, not merely by configuration.
#
# ⚠️ CUTOVER ORDER MATTERS. See the plan; briefly:
#   1. Create ironforge-product, verify it, THEN move the ironforge.trade domain.
#   2. Only then set IRONFORGE_MODE=lab and remove SCANNER_ENABLED + the account
#      credentials from the existing service.
# Both services may briefly have SCANNER_ENABLED during the handover — that is
# safe: the Postgres advisory lock in src/lib/scanner-lock.ts guarantees exactly
# one engine regardless, which is precisely what it was built for.
#
# NOTE: the existing service is named `ironforge` in the dashboard and is managed
# there, so its env changes must be made in the UI. This file is the source of
# truth for INTENT, not necessarily for what is currently deployed.

databases:
  - name: ironforge-db
    plan: free
    databaseName: ironforge
    user: ironforge

services:
  # ---- PRODUCT: the real business (ironforge.trade) ----
  - type: web
    name: ironforge-product
    runtime: node
    plan: starter
    rootDir: ironforge/webapp
    # The engine places REAL orders and must run in exactly ONE process. The
    # advisory lock is the real guarantee; pinning the count states the invariant
    # here too rather than leaving it implied by the plan tier.
    numInstances: 1
    buildCommand: npm install && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node start.js
    healthCheckPath: /api/health
    envVars:
      - key: IRONFORGE_MODE
        value: product
      # Client mirror — Next inlines NEXT_PUBLIC_* at BUILD time, so it must be
      # present during the build for nav filtering to apply.
      - key: NEXT_PUBLIC_IRONFORGE_MODE
        value: product
      # Master switch for the in-process trading engine. DEFAULT OFF in code — a
      # service without this set to exactly "true" serves web traffic and never
      # trades. See src/lib/db.ts ensureTables().
      - key: SCANNER_ENABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      # Customer accounts live in their own database (see lib/customers-db.ts).
      - key: CUSTOMERS_DATABASE_URL
        sync: false
      # Broker credentials — live money. These exist on THIS SERVICE ONLY.
      - key: TRADIER_API_KEY
        sync: false
      # TRADIER_BASE_URL intentionally omitted — defaults to production for live
      # market-data quotes. Sandbox orders use the hardcoded SANDBOX_URL.
      - key: TRADIER_SANDBOX_KEY_USER
        sync: false
      - key: TRADIER_SANDBOX_KEY_MATT
        sync: false
      - key: TRADIER_SANDBOX_KEY_LOGAN
        sync: false
      - key: TRADIER_SPARK2_API_KEY
        sync: false
      - key: TRADIER_SPARK2_ACCOUNT_ID
        sync: false
      - key: IRONFORGE_SESSION_SECRET
        sync: false
      # Distinct from the operator session secret so an operator-sealed cookie
      # cannot decrypt as a customer session. See lib/auth/customer-session.ts.
      - key: IRONFORGE_CUSTOMER_SESSION_SECRET
        sync: false
      - key: IRONFORGE_SERVICE_TOKEN
        sync: false
      - key: IRONFORGE_ADMIN_KEY
        sync: false
      - key: IRONFORGE_PAUSE_PASSWORD
        sync: false
      # Customer-side integrations.
      - key: SNAPTRADE_CLIENT_ID
        sync: false
      - key: SNAPTRADE_CONSUMER_KEY
        sync: false
      - key: SNAPTRADE_SECRET_KEY
        sync: false
      - key: SNAPTRADE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ---- LAB: private research (ironforge-899p.onrender.com) ----
  - type: web
    name: ironforge-lab
    runtime: node
    plan: starter
    rootDir: ironforge/webapp
    buildCommand: npm install && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node start.js
    healthCheckPath: /api/health
    envVars:
      - key: IRONFORGE_MODE
        value: lab
      - key: NEXT_PUBLIC_IRONFORGE_MODE
        value: lab
      # SCANNER_ENABLED deliberately ABSENT. The engine defaults off; the lab
      # must never place an order. Do not add it here.
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      # Market-data key ONLY — used for quotes and option chains so research
      # pages can price paper positions. NO production account credentials
      # (TRADIER_SPARK2_*, account IDs) live here, so isProductionBot() and
      # getProductionAccountsForBot() make a live order impossible in code.
      - key: TRADIER_API_KEY
        sync: false
      - key: TRADIER_SANDBOX_KEY_USER
        sync: false
      - key: IRONFORGE_SESSION_SECRET
        sync: false
      - key: IRONFORGE_SERVICE_TOKEN
        sync: false
      - key: IRONFORGE_ADMIN_KEY
        sync: false
      # Research tooling.
      - key: TRADING_VOLATILITY_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALPHAGEX_API_BASE
        value: https://alphagex-api.onrender.com
      - key: NODE_ENV
        value: production
