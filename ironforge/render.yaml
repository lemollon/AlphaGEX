# IronForge on Render
# ====================
# FLAME + SPARK Iron Condor paper trading bots.
# The scan loop runs INSIDE the Next.js webapp (no separate workers).

databases:
  - name: ironforge-db
    plan: free
    databaseName: ironforge
    user: ironforge

services:
  # ---- Next.js Dashboard + Scanner ----
  - type: web
    name: ironforge-dashboard
    runtime: node
    plan: free
    rootDir: ironforge/webapp
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ironforge-db
          property: connectionString
      - key: TRADIER_API_KEY
        sync: false
      # TRADIER_BASE_URL intentionally omitted — defaults to production
      # (https://api.tradier.com/v1) for live market data quotes.
      # Sandbox orders use the hardcoded SANDBOX_URL in tradier.ts.
      - key: TRADIER_SANDBOX_KEY_USER
        sync: false
      - key: TRADIER_SANDBOX_KEY_MATT
        sync: false
      - key: TRADIER_SANDBOX_KEY_LOGAN
        sync: false
      - key: NODE_ENV
        value: production
